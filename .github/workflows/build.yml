name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  UNITY_VERSION: 6000.3.9f1
  PROJECT_NAME: NexA

jobs:
  # ──────────────────────────────────────────────
  # Calcul de la version (basé sur le nb de releases existantes)
  # ──────────────────────────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.compute.outputs.version }}

    steps:
      - name: Compute next version
        id: compute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAJOR: 1
          MINOR: 0
        run: |
          PREFIX="v${MAJOR}.${MINOR}."

          TAGS=$(gh api repos/${{ github.repository }}/tags --paginate --jq '.[].name')

          MATCHING=$(echo "$TAGS" | grep "^${PREFIX}" || true)

          if [ -z "$MATCHING" ]; then
            NEXT=1
          else
            LAST=$(echo "$MATCHING" | sed "s/${PREFIX}//" | sort -n | tail -n 1)
            NEXT=$((LAST + 1))
          fi

          VERSION="${PREFIX}${NEXT}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Prochaine version : ${VERSION}"


  # ──────────────────────────────────────────────
  # Build matrix: Windows64 & Linux64 en parallèle
  # ──────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.targetPlatform }}
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneLinux64
          - targetPlatform: StandaloneWindows64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.targetPlatform }}-
            Library-

      - name: Build ${{ matrix.targetPlatform }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          unityVersion:   ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}
          buildsPath:     build
          buildName:      ${{ env.PROJECT_NAME }}
          scenes: Assets/Scenes/Hub.unity

      # Nom de l'asset : ProjectName_vX.X.X_Linux64.zip / _Windows64.zip
      - name: Zip build
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PLATFORM=$(echo "${{ matrix.targetPlatform }}" | sed 's/Standalone//')
          cd build
          zip -r ../${{ env.PROJECT_NAME }}_${VERSION}_${PLATFORM}.zip ${{ matrix.targetPlatform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.targetPlatform }}
          path: ${{ env.PROJECT_NAME }}_${{ needs.version.outputs.version }}_*.zip
          retention-days: 7

  # ──────────────────────────────────────────────
  # Release : crée UNE release avec les 2 ZIPs
  # ──────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-StandaloneWindows64
          path: artifacts/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-StandaloneLinux64
          path: artifacts/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: "${{ env.PROJECT_NAME }} ${{ needs.version.outputs.version }}"
          body: |
            ### ${{ env.PROJECT_NAME }} ${{ needs.version.outputs.version }}
            Commit : ${{ github.sha }}
            Branch : `${{ github.ref_name }}`
          files: artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Send Discord notification
        run: |
          jq -n \
            --arg version "${{ needs.version.outputs.version }}" \
            --arg msg "$(echo "${{ github.event.head_commit.message }}" | tail -n +2)" \
            --arg url "https://github.com/${{ github.repository }}/releases/tag/${{ needs.version.outputs.version }}" \
            '{
              username: "GitHub Bot",
              content: "@everyone\n🚀 Nouvelle build publiée !\n\n📦 Version: \($version)\n📝 Patch note: \n \($msg)\n🔗 \($url)"
            }' | curl -H "Content-Type: application/json" -X POST -d @- ${{ secrets.DISCORD_WEBHOOK_URL }}
